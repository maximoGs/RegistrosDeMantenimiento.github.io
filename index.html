<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarUp - Digital Intake</title>
    <meta name="description" content="Formulario de ingreso digital para taller mecánico.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <span class="logo-accent">Car</span>Up
            </div>
            <h1>Intake Digital</h1>
            <p>Registro de ingreso vehicular</p>
        </header>

        <main>
            <form id="intake-form" class="glass-form">
                
                <!-- Sección Mecánico -->
                <section class="form-section">
                    <h2><span class="icon">🧑‍🔧</span> Datos del Mecánico</h2>
                    <div class="input-group">
                        <input type="text" id="mechanicName" required placeholder=" ">
                        <label for="mechanicName">Nombre del Mecánico</label>
                    </div>
                    <div class="input-group">
                        <input type="text" id="workshopName" required placeholder=" ">
                        <label for="workshopName">Taller / Sucursal</label>
                    </div>
                </section>

                <!-- Sección Vehículo -->
                <section class="form-section">
                    <h2><span class="icon">🚗</span> Datos del Vehículo</h2>
                    <div class="form-row">
                        <div class="input-group half">
                            <input type="text" id="carBrand" required placeholder=" ">
                            <label for="carBrand">Marca</label>
                        </div>
                        <div class="input-group half">
                            <input type="text" id="carModel" required placeholder=" ">
                            <label for="carModel">Modelo</label>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="input-group half">
                            <input type="text" id="carYear" required placeholder=" ">
                            <label for="carYear">Año</label>
                        </div>
                        <div class="input-group half">
                            <input type="text" id="carPlate" required placeholder=" ">
                            <label for="carPlate">Patente / Dominio</label>
                        </div>
                    </div>

                    <div class="input-group">
                        <input type="number" id="carMileage" required placeholder=" ">
                        <label for="carMileage">Kilometraje Actual</label>
                    </div>
                    
                    <div class="input-group">
                        <input type="text" id="carVin" placeholder=" ">
                        <label for="carVin">VIN (Opcional)</label>
                    </div>
                </section>

                <!-- Sección Estado Base -->
                <section class="form-section">
                    <h2><span class="icon">📋</span> Motivo de Ingreso</h2>
                    <div class="input-group select-group">
                        <select id="serviceReason" required>
                            <option value="" disabled selected>Seleccione un motivo...</option>
                            <option value="Mantenimiento Programado">Mantenimiento Programado</option>
                            <option value="Falla / Queja del Conductor">Falla / Queja del Conductor</option>
                            <option value="Avería en Carretera">Avería en Carretera</option>
                            <option value="Siniestro">Siniestro</option>
                        </select>
                    </div>
                    
                    <div class="input-group">
                        <textarea id="observations" rows="4" placeholder=" "></textarea>
                        <label for="observations">Observaciones (Daños previos, ruidos, etc.)</label>
                    </div>
                </section>

                <button type="submit" class="submit-btn">
                    <span>Enviar a WhatsApp</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                </button>
            </form>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
